name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    env:
      # Dummy values so pydantic-settings doesn't complain at import time.
      # Tests use an in-memory SQLite DB; these are never actually used.
      DATABASE_URL: "sqlite+aiosqlite://"
      GROQ_API_KEY: "test-key"
      ANTHROPIC_API_KEY: "test-key"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Verify imports
        run: python -c "from main import app; print('main import OK')"

      - name: Run tests
        run: pytest tests/ -v --tb=long -p no:warnings
