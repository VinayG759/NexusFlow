services:
  - type: web
    name: nexusflow
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: NexusFlow
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: false
      - key: OUTPUT_DIRECTORY
        value: /tmp/nexusflowbuiltprojects
      - key: GROQ_API_KEY
        sync: false
      - key: WEB_SEARCH_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
